services:
  postgres:
    image: postgres:16
    container_name: task-postgres
    restart: always
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mynetwork

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command:
      - start-dev
      - --import-realm
      - --hostname=keycloak
      - --hostname-strict=false
      - --http-relative-path=/
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak-config/:/opt/keycloak/data/import
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: bridge

volumes:
  postgres_data:
